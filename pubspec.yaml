name: pokedex
description: "Pokemon App - Modular Clean Architecture"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  core:
    path: ./packages/core
  core_ui:
    path: ./packages/core_ui
  pokemon:
    path: ./packages/features/pokemon
  camera:
    path: ./packages/features/camera
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.2.0
  injectable: ^2.4.1
  get_it: ^7.6.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^5.1.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  injectable_generator: ^2.6.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "eevee.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - eevee.jpg
